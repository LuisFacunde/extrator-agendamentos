services:
   api:
      build:
         context: .
         dockerfile: Dockerfile
         target: production
      container_name: extrator-agendamentos-api
      restart: unless-stopped
      ports:
         - "${PORT:-3000}:3000"
      environment:
         NODE_ENV: production
         DB_USER: ${DB_USER}
         DB_PASSWORD: ${DB_PASSWORD}
         DB_HOST: ${DB_HOST}
         DB_PORT: ${DB_PORT:-1521}
         DB_SERVICE: ${DB_SERVICE}
         GEMINI_API_KEY: ${GEMINI_API_KEY}
         ORACLE_CLIENT_PATH: /opt/oracle/instantclient
         PORT: 3000
         HOST: 0.0.0.0
      healthcheck:
         test:
            [
               "CMD",
               "node",
               "-e",
               "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
            ]
         interval: 30s
         timeout: 10s
         retries: 3
         start_period: 20s
      networks:
         - extrator-net
      logging:
         driver: json-file
         options:
            max-size: "10m"
            max-file: "3"

networks:
   extrator-net:
      driver: bridge
